<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receta Pizza Néstor</title>
    <link rel="stylesheet" href="Estilo4.css">
</head>
<body>
    <div class="receta_Pizza">
        <h1>Receta de pizza al estilo Napoletana</h1>
        <img src="pizza.jpg" alt="imagen pizza">
        <div class="ingredientes">
                <h3>INGREDIENTES</h3>
                <ul>
                <li>tomate</li>
                <li>masa de pizza</li>
                <li>Jamon York</li>
                <li>Queso Rallado</li>
                <li>Albahaca</li>
                </ul>
        </div>
        <div class="pasos">
                <h3>PASOS A REALIZAR</h3>
                <ol>
                <li>Extender la masa</li>
                <li>Poner tomate y queso</li>

                <li>Poner albahaca y a comer!!</li>
                </ol>
        </div>
    </div>
    <p>ESTO ES unA PRUEBA</p>
