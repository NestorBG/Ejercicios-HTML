<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios</title>
    <link rel="stylesheet" href="Estilo8.css">
</head>
<body>
    <div class="horario">
    <table>
        <caption>HORARIO</caption>
        <tr class="dias">
            <th>Horas</th>
            <th>Lunes</th>
            <th>Martes</th>
            <th>Miercoles</th>
            <th>Jueves</th>
            <th>Viernes</th>
        </tr>
        <tr class="primeraHora">
            <td>15:30-16:25</td>
            <td rowspan="2">SOR</td>
            <td rowspan="3">SR</td>
            <td>Empresariales</td>
            <td>AW</td>
            <td>AW</td>
        </tr>
        <tr class="segundaHora">
            <td>16:25-17:20</td>
            <td rowspan="2">SOR</td>
            <td>SOR</td>
            <td>SI</td>
        </tr>
        <tr class="terceraHora">
            <td>17:20-18:15</td>
            <td>AW</td>
            <td>SR</td>
            <td>SI</td>
        </tr>
        <tr class="cuartaHora">
            <td>18:15-18:40</td>
            <th colspan="5">Recreo</th>
        </tr>
        <tr class="quintaHora">
            <td>18:40-19:35</td>
            <td>SI</td>
            <td>SR</td>
            <td>SI</td>
            <td>AW</td>
            <td>SOR</td>
        </tr>
        <tr class="sextaHora">
            <td>19:35-20:30</td>
            <td>Empresariales</td>
            <td>Inglés</td>
            <td>Empresariales</td>
            <td>Inglés</td>
            <td>SR</td>
        </tr>
        <tr class="septimaHora">
            <td>20:30-21:25</td>
            <td>SR</td>
            <td>SI</td>
            <td>SR</td>
            <td>SI</td>
            <td>SI</td>
        </tr>
    </table>
    </div>
</body>
</html>
