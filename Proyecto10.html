<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="Estilo10.css">
</head>
<body>
    <div class="formulario">
            <form>
            <h1>Formulario</h1>
            <fieldset>
                <legend>Datos personales</legend><br>
                    <label for="nombre">Nombre</label> 
                    <input type="text" required id="nombre"> <br><br>
                    <label for="apellidos">Apellidos</label> 
                    <input type="text" required id="apellidos"> <br><br>
                    <label for="email">Email</label>
                    <input type="email" required id="email"> <br><br>
                    <label for="telefono">Telefono</label>
                    <input type="text" required id="telefono"> <br><br>
                    <label for="fecha">Fecha de nacimiento</label>
                    <input type="date" id="fecha"> <br><br>
                    <input type="submit" value="Enviar" class="enviar"><br><br>
            </fieldset>
        </form>
    </div>
</body>
</html>
